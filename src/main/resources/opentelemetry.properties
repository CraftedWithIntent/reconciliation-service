# OpenTelemetry Configuration
# Distributed tracing, metrics, and observability setup

# Service identification
otel.service.name=reconciliation-service
otel.service.version=1.0.0

# Exporter configuration
# Jaeger for distributed tracing
otel.exporter.jaeger.endpoint=${OTEL_EXPORTER_JAEGER_ENDPOINT:http://localhost:14268/api/traces}
otel.exporter.jaeger.agent.host=${OTEL_EXPORTER_JAEGER_AGENT_HOST:localhost}
otel.exporter.jaeger.agent.port=${OTEL_EXPORTER_JAEGER_AGENT_PORT:6831}

# Prometheus metrics exporter
otel.exporter.prometheus.port=${OTEL_EXPORTER_PROMETHEUS_PORT:8888}
otel.exporter.prometheus.host=${OTEL_EXPORTER_PROMETHEUS_HOST:0.0.0.0}

# SDK Configuration
# Sampling rate (0.0 to 1.0 - use 1.0 for development, lower for production)
otel.traces.sampler=${OTEL_TRACES_SAMPLER:parentbased_always_on}
otel.traces.sampler.arg=${OTEL_TRACES_SAMPLER_ARG:1.0}

# Batch span processor configuration
otel.bsp.schedule.delay=${OTEL_BSP_SCHEDULE_DELAY:5000}
otel.bsp.max.queue.size=${OTEL_BSP_MAX_QUEUE_SIZE:2048}
otel.bsp.max.export.batch.size=${OTEL_BSP_MAX_EXPORT_BATCH_SIZE:512}
otel.bsp.export.timeout=${OTEL_BSP_EXPORT_TIMEOUT:30000}

# Metric intervals
otel.sdk.metrics.export.interval=${OTEL_SDK_METRICS_EXPORT_INTERVAL:60000}

# Enable/disable specific exporters
otel.sdk.disabled=${OTEL_SDK_DISABLED:false}

# Resource attributes (for better observability)
otel.resource.attributes=deployment.environment=${OTEL_DEPLOYMENT_ENV:development},service.namespace=reconcile
