---
spring:
  application:
    name: "reconciliation-service"
  autoconfigure:
    exclude: "org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration"
  datasource:
    source:
      url: "jdbc:postgresql://${SOURCE_DB_HOST:source-db}:${SOURCE_DB_PORT:5432}/${SOURCE_DB_NAME:source_db}"
      username: "${SOURCE_DB_USER:postgres}"
      password: "${SOURCE_DB_PASSWORD:#{T(java.lang.System).getenv('SOURCE_DB_PASSWORD')}}"
      driver-class-name: "org.postgresql.Driver"
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 20000
        idle-timeout: 300000
        max-lifetime: 1200000
    target:
      url: "jdbc:postgresql://${TARGET_DB_HOST:target-db}:${TARGET_DB_PORT:5432}/${TARGET_DB_NAME:target_db}"
      username: "${TARGET_DB_USER:postgres}"
      password: "${TARGET_DB_PASSWORD:#{T(java.lang.System).getenv('TARGET_DB_PASSWORD')}}"
      driver-class-name: "org.postgresql.Driver"
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 20000
        idle-timeout: 300000
        max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: "validate"
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.PostgreSQLDialect"
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: true
        use_sql_comments: true
server:
  port: "${SERVER_PORT:8080}"
  servlet:
    context-path: "/"
  compression:
    enabled: true
    mime-types: "application/json,application/xml,text/html,text/xml,text/plain"
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: "always"
logging:
  level:
    root: "INFO"
    com.reconcile: "DEBUG"
    org.springframework.web: "INFO"
    org.hibernate.SQL: "DEBUG"
    org.hibernate.type.descriptor.sql.BasicBinder: "TRACE"
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - [%thread] - %-5level - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - [%thread] - %-5level - %logger{36} - %msg%n"
  file:
    name: "logs/reconciliation-service.log"
    max-size: "10MB"
    max-history: 10
